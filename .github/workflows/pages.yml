name: Deploy docs and demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # renderers-html and typedoc resolve core through its dist
      - run: pnpm build

      - name: Build docs site (typedoc + vitepress)
        run: pnpm docs:build

      - name: Build demo app
        run: pnpm --filter demo build
        env:
          DEMO_BASE: /react-form-engine/demo/

      - name: Assemble site (docs at /, demo at /demo/)
        run: |
          mkdir -p site
          cp -r docs/.vitepress/dist/* site/
          cp -r apps/demo/dist site/demo

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
